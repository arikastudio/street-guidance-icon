<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <title>街頭指導</title>

  <meta name="theme-color" content="#2563eb">
  <meta name="application-name" content="街頭指導">
  <meta name="apple-mobile-web-app-title" content="街頭指導">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <link rel="icon" type="image/png" href="./apple-touch-icon.png">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="512x512" href="./apple-touch-icon.png">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4f7fb;
      color: #172033;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    }

    .box {
      width: min(88vw, 360px);
      padding: 24px;
      border-radius: 20px;
      background: #ffffff;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      text-align: center;
      border: 1px solid #dce3ee;
    }

    img {
      width: 120px;
      height: 120px;
      border-radius: 26px;
      display: block;
      margin: 0 auto 16px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    p {
      margin: 0 0 18px;
      color: #647084;
      font-size: 14px;
      line-height: 1.6;
    }

    a {
      display: inline-block;
      padding: 13px 18px;
      border-radius: 14px;
      background: #2563eb;
      color: #ffffff;
      text-decoration: none;
      font-weight: 800;
    }

    .small {
      margin-top: 14px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzTuxp_9_IFCiEcwB0yHgExhZG6C6ZuM8rTk5Mu27tnnEwlk_Xk-XVjuzyJLkbBv2askw/exec';

    window.addEventListener('load', function () {
      const isIosStandalone = window.navigator.standalone === true;
      const isStandaloneDisplay = window.matchMedia('(display-mode: standalone)').matches;

      if (isIosStandalone || isStandaloneDisplay) {
        window.location.href = WEB_APP_URL;
      }
    });
  </script>
</head>

<body>
  <div class="box">
    <img src="./apple-touch-icon.png" alt="街頭指導">
    <h1>街頭指導</h1>
    <p>ホーム画面に追加する場合は、この画面で共有ボタンから追加してください。</p>
    <a href="https://script.google.com/macros/s/AKfycbzTuxp_9_IFCiEcwB0yHgExhZG6C6ZuM8rTk5Mu27tnnEwlk_Xk-XVjuzyJLkbBv2askw/exec">
      起動する
    </a>
    <div class="small">ホーム画面から開いた場合は自動で起動します。</div>
  </div>
</body>
</html>
